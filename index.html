<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记账本</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --panel: #fffdf9;
      --ink: #202124;
      --muted: #6b6258;
      --line: #e3ddd2;
      --navy: #17324d;
      --red: #c2412d;
      --green: #28753c;
      --blue: #2e86ab;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid #d8d2c6;
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
    }
    button:hover { border-color: #8f7f69; }
    button:disabled { cursor: not-allowed; opacity: .45; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #d8d2c6;
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }
    textarea { min-height: 112px; resize: vertical; line-height: 1.6; }
    .field-label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .field-label strong {
      color: var(--navy);
      font-size: 14px;
    }
    .field-hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(46,134,171,.14);
    }
    .app { max-width: 1240px; margin: 0 auto; padding: 24px; }
    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }
    h1 { margin: 0; font-size: 34px; line-height: 1.1; color: var(--navy); }
    h2 { margin: 0; font-size: 18px; color: var(--navy); }
    p { margin: 8px 0 0; color: var(--muted); }
    .tabs, .segmented, .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs button, .segmented button { min-width: 72px; }
    .active, .primary {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }
    .danger { color: #b42318; border-color: #e3b5ad; }
    main { display: grid; gap: 18px; }
    .grid { display: grid; gap: 18px; }
    .two { grid-template-columns: minmax(0,.95fr) minmax(0,1.05fr); }
    .aa-grid { grid-template-columns: 280px minmax(260px,360px) minmax(0,1fr); align-items: start; }
    .panel, .metric {
      background: rgba(255,253,249,.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(70,55,36,.06);
    }
    .panel { padding: 18px; display: grid; gap: 14px; }
    .section-title, .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .section-title span, .muted, .empty, .note, .message {
      color: var(--muted);
      font-size: 14px;
    }
    .preview {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: 10px;
    }
    .preview div, .mini-table div, .settlement, .aa-expense, .note {
      border: 1px solid #ebe4d9;
      background: #faf7f1;
      border-radius: 8px;
    }
    .preview div { padding: 12px; display: grid; gap: 6px; }
    .preview .wide { grid-column: 1 / -1; }
    .preview span, .metric span, .mini-table span, .aa-expense em {
      color: #71685e;
      font-size: 13px;
      font-style: normal;
    }
    .list, .group-list, .expense-list, .settlements, .mini-table, .participant-list { display: grid; gap: 10px; }
    .filters {
      display: grid;
      gap: 10px;
    }
    .filter-search-row, .filter-select-row, .filter-date-row {
      display: grid;
      gap: 8px;
      align-items: center;
    }
    .filter-search-row {
      grid-template-columns: minmax(0, 1fr) auto;
    }
    .filter-select-row {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .filter-date-row {
      grid-template-columns: repeat(2, minmax(150px, 1fr));
    }
    .filters input, .filters select, .filters button {
      min-height: 38px;
      padding: 7px 10px;
    }
    .filter-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .filter-actions .muted {
      font-size: 12px;
      white-space: nowrap;
    }
    .budget-panel { gap: 12px; }
    .budget-bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #ece5d8;
    }
    .budget-bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }
    .budget-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .compare-panel summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--navy);
      font-weight: 700;
      cursor: pointer;
      list-style: none;
    }
    .compare-panel summary::-webkit-details-marker { display: none; }
    .compare-panel summary::after {
      content: "展开";
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }
    .compare-panel[open] summary::after { content: "收起"; }
    .compare-panel summary span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 400;
    }
    .compare-panel[open] {
      display: grid;
      gap: 12px;
    }
    .compare-item, .compare-row {
      border: 1px solid #ebe4d9;
      background: #faf7f1;
      border-radius: 8px;
      padding: 12px;
    }
    .compare-item { display: grid; gap: 5px; }
    .compare-item span, .compare-row span { color: var(--muted); font-size: 13px; }
    .compare-list { display: grid; gap: 8px; margin-top: 10px; }
    .compare-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) repeat(3, minmax(80px, auto));
      gap: 8px;
      align-items: center;
    }
    .transaction {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid #ece5da;
      padding: 10px 0;
    }
    .transaction:last-child { border-bottom: 0; }
    .transaction-title { font-weight: 700; margin-bottom: 4px; }
    .transaction-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 230px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      color: var(--badge);
      background: color-mix(in srgb, var(--badge) 14%, white);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .income { color: var(--green); }
    .expense { color: var(--red); }
    .icon { width: 32px; height: 32px; padding: 0; line-height: 1; }
    .period-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: min(100%, 320px);
    }
    .period-switcher input {
      min-width: 136px;
      text-align: center;
    }
    .period-switcher .icon {
      flex: 0 0 40px;
      height: 40px;
      font-size: 20px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
      gap: 14px;
    }
    .metric { padding: 16px; display: grid; gap: 8px; }
    .metric strong { font-size: 24px; }
    .chart { min-height: 360px; }
    .category-chart {
      display: grid;
      grid-template-columns: minmax(180px, 240px) minmax(0, 1fr);
      gap: 18px;
      align-items: center;
    }
    .category-legend {
      display: grid;
      gap: 10px;
    }
    .legend-row {
      display: grid;
      grid-template-columns: 14px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 14px;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: var(--legend-color);
    }
    .legend-row strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .legend-row span:last-child {
      color: var(--muted);
      white-space: nowrap;
    }
    .project-table {
      display: grid;
      gap: 10px;
    }
    .project-row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) repeat(3, minmax(88px, auto));
      align-items: center;
      gap: 12px;
      border: 1px solid #ebe4d9;
      background: #faf7f1;
      border-radius: 8px;
      padding: 12px;
    }
    .project-row strong {
      color: var(--navy);
    }
    .project-row span {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .project-detail {
      display: grid;
      gap: 10px;
      border: 1px solid #ebe4d9;
      background: #faf7f1;
      border-radius: 8px;
      padding: 12px;
    }
    .project-detail summary {
      cursor: pointer;
      list-style: none;
    }
    .project-detail summary::-webkit-details-marker {
      display: none;
    }
    .project-head {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) repeat(4, minmax(82px, auto)) auto;
      gap: 10px;
      align-items: center;
    }
    .project-head strong { color: var(--navy); }
    .project-head span, .project-head b, .project-category span {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .project-head b {
      justify-self: end;
      color: var(--blue);
      font-weight: 800;
    }
    .project-detail[open] .project-head b::after { content: "收起"; }
    .project-detail:not([open]) .project-head b::after { content: "展开"; }
    .project-category-list { display: grid; gap: 6px; }
    .project-category {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) repeat(2, minmax(80px, auto));
      gap: 8px;
      align-items: center;
      padding-top: 6px;
      border-top: 1px solid #ebe4d9;
    }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    .pagination span {
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
    }
    .pagination small {
      white-space: nowrap;
    }
    .empty {
      min-height: 120px;
      display: grid;
      place-items: center;
      border: 1px dashed #d8d2c6;
      border-radius: 8px;
    }
    .group { display: grid; gap: 4px; text-align: left; position: relative; }
    .group.active {
      border-color: #2e86ab;
      background: #f1f8fb;
      color: var(--navy);
      box-shadow: inset 4px 0 0 #2e86ab, 0 8px 20px rgba(46,134,171,.10);
    }
    .group.active span { color: #4f5f68; }
    .mini-table div {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px 12px;
    }
    .settlement { display: flex; align-items: center; gap: 10px; padding: 14px; }
    .settlement b { margin-left: auto; color: var(--navy); }
    .aa-expense {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 4px 12px;
      padding: 12px;
    }
    .aa-expense em { grid-column: 1 / -1; }
    .participant-list {
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }
    .participant-option {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #ebe4d9;
      background: #faf7f1;
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--navy);
      font-size: 14px;
    }
    .participant-option input {
      width: auto;
      accent-color: var(--navy);
    }
    .note { display: grid; gap: 6px; padding: 14px; }
    .settings-layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      align-items: start;
      gap: 18px;
    }
    .settings-column {
      display: grid;
      gap: 18px;
    }
    .settings-subsection {
      display: grid;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid #ebe4d9;
    }
    .settings-subsection:first-of-type {
      padding-top: 0;
      border-top: 0;
    }
    .settings-subtitle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .settings-subtitle h3 {
      margin: 0;
      color: var(--navy);
      font-size: 16px;
    }
    svg { width: 100%; max-width: 100%; height: auto; display: block; }
    .bar-label, .pie-label { font-size: 12px; fill: #51483f; }
    @media (max-width: 980px) {
      .topbar { align-items: stretch; flex-direction: column; }
      .toolbar { align-items: stretch; flex-direction: column; }
      .two, .aa-grid, .category-chart { grid-template-columns: 1fr; }
      .filters { gap: 10px; }
      .filter-select-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .filter-date-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .summary { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .compare-grid { grid-template-columns: 1fr; }
      .transaction { align-items: flex-start; flex-direction: column; }
      .transaction-right { width: 100%; min-width: 0; justify-content: space-between; }
      .period-switcher { width: 100%; }
      .period-switcher input { flex: 1; }
      .settings-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      body { padding-bottom: calc(76px + env(safe-area-inset-bottom)); }
      button, input, textarea, select { font-size: 16px; }
      .app { padding: 14px 12px; }
      .topbar {
        gap: 12px;
        margin-bottom: 14px;
      }
      h1 { font-size: 28px; }
      .topbar p { font-size: 14px; }
      .tabs {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        background: rgba(247,244,239,.96);
        border-top: 1px solid var(--line);
        box-shadow: 0 -10px 28px rgba(70,55,36,.10);
        backdrop-filter: blur(12px);
      }
      .tabs button {
        min-width: 0;
        padding: 10px 6px;
        border-radius: 8px;
      }
      .panel {
        padding: 14px;
        gap: 12px;
      }
      .section-title {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
      .preview, .summary, .mini-table div, .project-row, .project-head, .project-category { grid-template-columns: 1fr; }
      .compare-row { grid-template-columns: 1fr; }
      .filter-search-row, .filter-select-row, .filter-date-row { grid-template-columns: 1fr; }
      .summary { gap: 10px; }
      .metric { padding: 14px; }
      .metric strong { font-size: 21px; }
      .chart { min-height: 0; }
      .legend-row {
        grid-template-columns: 14px minmax(0, 1fr);
      }
      .legend-row span:last-child {
        grid-column: 2;
      }
      .transaction-right {
        display: grid;
        grid-template-columns: auto 1fr auto auto;
        justify-items: end;
      }
      .aa-expense {
        grid-template-columns: 1fr;
      }
      .aa-expense button {
        justify-self: start;
      }
      .settlement {
        align-items: flex-start;
        flex-direction: column;
      }
      .settlement b {
        margin-left: 0;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>记账本</h1>
        <p>自然语言记账、统计和 AA 结算</p>
      </div>
      <nav class="tabs" aria-label="主导航">
        <button data-tab="book" class="active">记账</button>
        <button data-tab="stats">统计</button>
        <button data-tab="aa">AA</button>
        <button data-tab="settings">设置</button>
      </nav>
    </header>
    <main id="app">
      <section class="grid two">
        <div class="panel">
          <div class="section-title"><h2>快速记账</h2><span>支持今天/昨天、金额、分类关键词</span></div>
          <textarea placeholder="例如：今天早饭10元、昨天报销80元、7月5日打车32元">今天早饭10元</textarea>
          <div class="preview">
            <div><span>日期</span><strong>今天</strong></div>
            <div><span>类型</span><strong>支出</strong></div>
            <div><span>金额</span><strong>¥10.00</strong></div>
            <div><span>分类</span><span class="badge" style="--badge:#e4572e">餐饮</span></div>
            <div class="wide"><span>备注</span><strong>早饭</strong></div>
          </div>
          <button class="primary">确认入账</button>
        </div>
        <div class="panel">
          <div class="section-title"><h2>最近记录</h2><span>0 条</span></div>
          <div class="empty">真实浏览器打开后可交互使用</div>
        </div>
      </section>
    </main>
  </div>

  <script>

    function today(offset = 0) {

    function parseDate(text) {
      if (/前天/.test(text)) return today(-2);
      if (/昨天/.test(text)) return today(-1);
      if (/明天/.test(text)) return today(1);
      if (/今天|刚刚|现在/.test(text)) return today();
      const full = text.match(/(20\d{2})[年/-](\d{1,2})[月/-](\d{1,2})/);
      if (full) return `${full[1]}-${full[2].padStart(2,"0")}-${full[3].padStart(2,"0")}`;
      const md = text.match(/(\d{1,2})[月/-](\d{1,2})[日号]?/);
      if (md) return `${new Date().getFullYear()}-${md[1].padStart(2,"0")}-${md[2].padStart(2,"0")}`;
      return today();
    }
    function parseAmount(text) {
      const withoutDate = text
        .replace(/(20\d{2})[年/-](\d{1,2})[月/-](\d{1,2})[日号]?/g, "")
        .replace(/\d{1,2}[月/-]\d{1,2}[日号]?/g, "");
      const m = withoutDate.match(/(?:￥|¥)?\s*(\d+(?:\.\d{1,2})?)\s*(?:元|块|rmb|RMB)?/);
      return m ? Number(m[1]) : 0;
    }
    function detectCategory(text) {
      const s = text.toLowerCase();

    }
    function detectType(text, category) {

    }
    function projectName(value) {

    function inferSelfMember(members) {
      return members.includes("我") ? "我" : members[0];
    }
    function txMatchesFilters(t) {
      const query = txFilters.query.trim().toLowerCase();
      if (query) {
        const haystack = [t.note, t.rawText, t.category, projectName(t.projectName), t.date, t.type === "income" ? "收入" : "支出"].join(" ").toLowerCase();
        if (!haystack.includes(query)) return false;
      }
      if (txFilters.type !== "all" && t.type !== txFilters.type) return false;
      if (txFilters.category !== "all" && t.category !== txFilters.category) return false;
      if (txFilters.project !== "all" && projectName(t.projectName) !== txFilters.project) return false;

    function filterOptions() {

    function cleanNote(text) {

        .replace(/(20\d{2})[年/-](\d{1,2})[月/-](\d{1,2})[日号]?/g, "")
        .replace(/\d{1,2}[月/-]\d{1,2}[日号]?/g, "")
        .replace(/今天|昨天|前天|明天|刚刚|现在/g, "")
        .replace(/(?:￥|¥)?\s*\d+(?:\.\d{1,2})?\s*(?:元|块|rmb|RMB)?/g, "")

    function scopedTransactions() {

      const expense = rows.filter(t => t.type === "expense").reduce((s, t) => s + Number(t.amount), 0);
      const aaExpense = rows.filter(t => t.type === "expense" && t.aaGroupId).reduce((s, t) => s + Number(t.amount), 0);
      return { income, expense, aaExpense, balance: income - expense };
    }
    function previousMonthKey(month) {

    function changeLabel(current, previous) {

      const percent = diff / previous * 100;
      return `${diff >= 0 ? "增加" : "减少"} ¥${money(Math.abs(diff))}（${Math.abs(percent).toFixed(1)}%）`;
    }
    function monthComparePanel(month) {
      const previous = previousMonthKey(month);
      const currentRows = monthRows(month);
      const previousRows = monthRows(previous);
      const current = summary(currentRows);

      const categories = categoryCompareRows(currentRows, previousRows);
      const pageInfo = paginate(categories, comparePage);

      return `<details class="panel compare-panel" id="monthCompare">
        <summary>环比 <span>${esc(month)} vs ${esc(previous)}</span></summary>

        ${categories.length ? `<div class="compare-list">${pageInfo.items.map(row => `<div class="compare-row"><strong>${esc(row.name)}</strong><span>本月 ¥${money(row.current)}</span><span>上月 ¥${money(row.previous)}</span><b class="${row.diff > 0 ? "expense" : row.diff < 0 ? "income" : ""}">${row.diff === 0 ? "持平" : `${row.diff > 0 ? "多花" : "少花"} ¥${money(Math.abs(row.diff))}`}</b></div>`).join("")}</div>${paginationHtml("compare", pageInfo, "类")}` : empty("本月和上月都没有分类支出")}
      </details>`;
    }
    function compareItem(label, current, previous) {
      const diff = current - previous;

    }
    function budgetPanel(title, periodKey, expense, budgetMap) {
      const budget = Number(budgetMap?.[periodKey] || 0);
      if (!budget) return "";
      const ratio = Math.min(expense / budget * 100, 100);
      const diff = budget - expense;
      return `<div class="panel budget-panel">
        <div class="section-title"><h2>${esc(title)}</h2><span>${esc(periodKey)}</span></div>
        <div class="budget-bar"><i style="width:${ratio}%"></i></div>
        <div class="budget-row"><span>预算 ¥${money(budget)}</span><span>已用 ¥${money(expense)}</span><strong class="${diff >= 0 ? "income" : "expense"}">${diff >= 0 ? "剩余" : "超支"} ¥${money(Math.abs(diff))}</strong></div>
      </div>`;
    }
    function calcAA(group) {
      const members = group.members.filter(Boolean);
      const paid = Object.fromEntries(members.map(m => [m, 0]));
      const shouldPay = Object.fromEntries(members.map(m => [m, 0]));
      group.expenses.forEach(e => {
        const amount = Number(e.amount) || 0;
        const participants = (e.participants || members).filter(m => members.includes(m));
        if (!e.payer || paid[e.payer] === undefined || participants.length === 0) return;
        paid[e.payer] += amount;
        participants.forEach(m => shouldPay[m] += amount / participants.length);
      });
      const debtors = [];
      const creditors = [];
      members.forEach(m => {
        const net = Number((paid[m] - shouldPay[m]).toFixed(2));
        if (net > .009) creditors.push({ member: m, amount: net });
        if (net < -.009) debtors.push({ member: m, amount: Math.abs(net) });
      });
      const settlements = [];
      let d = 0, c = 0;
      while (d < debtors.length && c < creditors.length) {
        const amount = Math.min(debtors[d].amount, creditors[c].amount);
        settlements.push({ from: debtors[d].member, to: creditors[c].member, amount: Number(amount.toFixed(2)) });
        debtors[d].amount = Number((debtors[d].amount - amount).toFixed(2));
        creditors[c].amount = Number((creditors[c].amount - amount).toFixed(2));
        if (debtors[d].amount <= .009) d++;
        if (creditors[c].amount <= .009) c++;
      }
      return { paid, shouldPay, settlements };
    }
    function empty(text) {

    function paginate(items, page, pageSize = PAGE_SIZE) {
      const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
      const safePage = Math.min(Math.max(Number(page) || 1, 1), totalPages);
      const start = (safePage - 1) * pageSize;
      return { items: items.slice(start, start + pageSize), page: safePage, totalPages, totalItems: items.length };
    }
    function paginationHtml(key, pageInfo, unit = "条") {
      if (pageInfo.totalItems <= PAGE_SIZE) return "";
      return `<div class="pagination" data-page-key="${key}">
        <button data-page-action="${key}-prev" ${pageInfo.page <= 1 ? "disabled" : ""}>上一页</button>
        <span>第 ${pageInfo.page} / ${pageInfo.totalPages} 页</span>
        <button data-page-action="${key}-next" ${pageInfo.page >= pageInfo.totalPages ? "disabled" : ""}>下一页</button>

    }

      document.querySelector(`[data-page-action="${key}-prev"]`)?.addEventListener("click", () => {
        if (pageInfo.page <= 1) return;
        onChange(pageInfo.page - 1);
      });
      document.querySelector(`[data-page-action="${key}-next"]`)?.addEventListener("click", () => {
        if (pageInfo.page >= pageInfo.totalPages) return;
        onChange(pageInfo.page + 1);
      });
    }
    function render() {

    function filterHtml() {

    function aaTransaction(group, expense) {
      const participants = (expense.participants || group.members).filter(m => group.members.includes(m));

      if (!participants.includes(selfMember) || participants.length === 0) return null;
      const amount = Number((Number(expense.amount) / participants.length).toFixed(2));
      const category = detectCategory(expense.note);
      return {
        id: uid("tx"),
        date: expense.date || today(),
        type: "expense",
        amount,
        category,
        note: `AA-${group.name}-${expense.note}`,
        rawText: `AA ${group.name} ${expense.note} ${selfMember}的均摊 ¥${money(amount)}`,
        projectName: projectName(group.projectName || group.name),
        createdAt: new Date().toISOString(),
        aaGroupId: group.id,
        aaExpenseId: expense.id

    }

    function trendRows(rows) {
      if (statsMode === "month") {
        const days = new Date(Number(statsDate.slice(0,4)), Number(statsDate.slice(5,7)), 0).getDate();
        return Array.from({ length: days }, (_, i) => {
          const date = `${statsDate.slice(0,7)}-${String(i + 1).padStart(2,"0")}`;
          const dayRows = rows.filter(t => t.date === date);
          return { label: String(i + 1), income: summary(dayRows).income, expense: summary(dayRows).expense };
        });
      }
      return Array.from({ length: 12 }, (_, i) => {
        const key = `${statsDate.slice(0,4)}-${String(i + 1).padStart(2,"0")}`;
        const monthRows = rows.filter(t => t.date.slice(0,7) === key);
        return { label: `${i + 1}月`, income: summary(monthRows).income, expense: summary(monthRows).expense };
      });
    }
    function barChart(rows) {
      const data = trendRows(rows);
      const max = Math.max(1, ...data.map(d => Math.max(d.income, d.expense)));
      const w = 760, h = 280, pad = 36;
      const step = (w - pad * 2) / data.length;
      const bw = Math.max(3, step * .28);
      const bars = data.map((d, i) => {
        const x = pad + i * step + step * .18;
        const ih = d.income / max * (h - pad * 2);
        const eh = d.expense / max * (h - pad * 2);
        return `<rect x="${x}" y="${h-pad-ih}" width="${bw}" height="${ih}" fill="#3a7d44" rx="3"></rect>
          <rect x="${x+bw+2}" y="${h-pad-eh}" width="${bw}" height="${eh}" fill="#e4572e" rx="3"></rect>
          ${(statsMode === "year" || i % 3 === 0) ? `<text x="${x}" y="${h-10}" class="bar-label">${esc(d.label)}</text>` : ""}`;
      }).join("");
      return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="收支趋势图">
        <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#d8d2c6"></line>
        <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#d8d2c6"></line>
        ${bars}
        <text x="${w-150}" y="24" class="bar-label">绿色收入 · 红色支出</text>
      </svg>`;
    }
    function categoryData(rows) {
      const map = new Map();
      rows.filter(t => t.type === "expense").forEach(t => {
        const meta = catMeta(t.category);
        const name = meta[0];
        const current = map.get(name) || { name, value: 0, color: meta[1] };
        current.value += Number(t.amount);
        map.set(name, current);
      });
      return [...map.values()].sort((a, b) => b.value - a.value);
    }
    function categoryCompareRows(currentRows, previousRows) {
      const current = new Map(categoryData(currentRows).map(item => [item.name, item.value]));
      const previous = new Map(categoryData(previousRows).map(item => [item.name, item.value]));
      return [...new Set([...current.keys(), ...previous.keys()])]
        .map(name => ({ name, current: current.get(name) || 0, previous: previous.get(name) || 0 }))
        .map(row => ({ ...row, diff: row.current - row.previous }))
        .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff) || b.current - a.current);
    }
    function projectData(rows) {
      const map = new Map();
      rows.forEach(t => {
        const name = projectName(t.projectName);
        const current = map.get(name) || { name, income: 0, expense: 0, aaExpense: 0, count: 0, rows: [] };
        if (t.type === "income") current.income += Number(t.amount);
        if (t.type === "expense") {
          current.expense += Number(t.amount);
          current.aaExpense += t.aaGroupId ? Number(t.amount) : 0;
        }
        current.count += 1;
        current.rows.push(t);
        map.set(name, current);
      });
      return [...map.values()].sort((a, b) => b.expense - a.expense);
    }
    function projectSummary(rows) {

    function projectDetail(item, index) {
      const balance = item.income - item.expense;
      const categories = categoryData(item.rows);

        }).join("")}</div>`

      return `<details class="project-detail" id="projectDetail${index}">

    function pieChart(data) {
      if (!data.length) return empty("当前周期没有支出");
      const total = data.reduce((s, d) => s + d.value, 0);
      let acc = 0;
      const slices = data.map(d => {
        const percent = d.value / total * 100;
        const dash = `${percent} ${100 - percent}`;
        const offset = -acc;
        acc += percent;
        return `<circle r="70" cx="110" cy="110" pathLength="100" fill="transparent" stroke="${d.color}" stroke-width="38" stroke-dasharray="${dash}" stroke-dashoffset="${offset}" transform="rotate(-90 110 110)"><title>${esc(d.name)}：¥${money(d.value)}，${percent.toFixed(1)}%</title></circle>`;
      }).join("");
      const pageInfo = paginate(data, categoryPage);
      categoryPage = pageInfo.page;
      const legend = pageInfo.items.map(d => {
        const percent = d.value / total * 100;
        return `<div class="legend-row" title="${esc(d.name)}：¥${money(d.value)}，${percent.toFixed(1)}%"><i class="legend-dot" style="--legend-color:${d.color}"></i><strong>${esc(d.name)}</strong><span>¥${money(d.value)} · ${percent.toFixed(1)}%</span></div>`;
      }).join("");
      return `<div class="category-chart"><svg viewBox="0 0 220 220" role="img" aria-label="支出分类图">${slices}<circle cx="110" cy="110" r="48" fill="#fffdf9"></circle><text x="110" y="106" text-anchor="middle" class="pie-label">总支出</text><text x="110" y="128" text-anchor="middle" class="pie-label">¥${money(total)}</text></svg><div><div class="category-legend">${legend}</div>${paginationHtml("category", pageInfo, "类")}</div></div>`;
    }

            </div>
            <div class="settings-subsection">
              <div class="settings-subtitle"><h3>导入 / 恢复</h3><span class="muted">JSON / CSV 表格</span></div>
              <textarea id="importText" placeholder="粘贴之前导出的 JSON，或粘贴 CSV / Excel 表格。支持日期/交易时间、类型/收支、金额/金额(元)/借方金额/贷方金额、分类/交易分类、备注/摘要/商品说明等列名。"></textarea>
              <input id="csvFile" type="file" accept=".csv,.txt,text/csv">
              <div class="row"><button class="primary" id="mergeImport">导入 JSON</button><button id="importCsv">导入表格 CSV</button><button class="danger" id="clearAll">清空数据</button></div>
              <p class="message" id="msg"></p>
            </div>
          </div>
        </section>`;
      document.querySelector("#exportJson").addEventListener("click", () => download(`记账本-${today()}.json`, JSON.stringify(state, null, 2), "application/json;charset=utf-8"));
      document.querySelector("#exportCsv").addEventListener("click", exportCsv);
      document.querySelector("#mergeImport").addEventListener("click", mergeImport);
      document.querySelector("#importCsv").addEventListener("click", importCsv);
      document.querySelector("#csvFile").addEventListener("change", loadCsvFile);
      bindPagination("budget", budgetPageInfo, page => {
        budgetPage = page;
        renderSettings();
      });
      bindPagination("yearBudget", yearBudgetPageInfo, page => {
        yearBudgetPage = page;
        renderSettings();
      });
      document.querySelector("#budgetMonth").addEventListener("change", () => {
        const month = document.querySelector("#budgetMonth").value;
        document.querySelector("#budgetAmount").value = state.budgets?.[month] || "";
      });
      document.querySelector("#budgetYear").addEventListener("change", () => {
        const year = document.querySelector("#budgetYear").value;
        document.querySelector("#yearBudgetAmount").value = state.yearBudgets?.[year] || "";
      });
      document.querySelector("#saveBudget").addEventListener("click", () => {
        const month = document.querySelector("#budgetMonth").value;
        const amount = Number(document.querySelector("#budgetAmount").value);
        if (!month || !Number.isFinite(amount) || amount <= 0) return;
        state.budgets = { ...(state.budgets || {}), [month]: amount };
        budgetPage = 1;
        save();
        renderSettings();
      });
      document.querySelector("#deleteBudget").addEventListener("click", () => {
        const month = document.querySelector("#budgetMonth").value;
        if (!month) return;
        state.budgets = { ...(state.budgets || {}) };
        delete state.budgets[month];
        budgetPage = 1;
        save();
        renderSettings();
      });
      document.querySelector("#saveYearBudget").addEventListener("click", () => {
        const year = document.querySelector("#budgetYear").value;
        const amount = Number(document.querySelector("#yearBudgetAmount").value);
        if (!/^\d{4}$/.test(year) || !Number.isFinite(amount) || amount <= 0) return;
        state.yearBudgets = { ...(state.yearBudgets || {}), [year]: amount };
        yearBudgetPage = 1;
        save();
        renderSettings();
      });
      document.querySelector("#deleteYearBudget").addEventListener("click", () => {
        const year = document.querySelector("#budgetYear").value;
        if (!year) return;
        state.yearBudgets = { ...(state.yearBudgets || {}) };
        delete state.yearBudgets[year];
        yearBudgetPage = 1;
        save();
        renderSettings();
      });
      document.querySelector("#clearAll").addEventListener("click", () => {
        if (!confirm("确定清空所有本地记账和 AA 数据吗？")) return;
        state.transactions = [];
        state.aaGroups = [];
        state.budgets = {};
        state.yearBudgets = {};
        save();
        renderSettings();
      });
    }
    function download(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }
    function exportCsv() {
      const header = ["日期","类型","金额","分类","活动","备注","原文"];
      const rows = state.transactions.map(t => [t.date, t.type === "income" ? "收入" : "支出", t.amount, t.category, projectName(t.projectName), t.note, t.rawText]);
      const csv = [header, ...rows].map(row => row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
      download(`记账明细-${today()}.csv`, `\uFEFF${csv}`, "text/csv;charset=utf-8");
    }
    function hashText(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i += 1) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
      return Math.abs(hash).toString(16);
    }
    function parseCsvLine(line, delimiter) {
      const cells = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        if (ch === "\"") {
          if (quoted && line[i + 1] === "\"") {
            cell += "\"";
            i += 1;
          } else {
            quoted = !quoted;
          }
        } else if (ch === delimiter && !quoted) {
          cells.push(cell.trim());
          cell = "";
        } else {
          cell += ch;
        }
      }
      cells.push(cell.trim());
      return cells;
    }
    const tableAliases = {
      date: ["日期", "交易日期", "交易时间", "支付时间", "创建时间", "发生时间", "记账日期", "账务日期", "入账日期", "Date", "Time"],
      type: ["类型", "收支", "收/支", "收支类型", "交易类型", "借贷方向", "方向", "Type"],
      amount: ["金额", "交易金额", "金额(元)", "金额（元）", "商品金额", "商品金额(元)", "商品金额（元）", "实际支付金额", "发生金额", "入账金额", "Amount"],
      expenseAmount: ["支出金额", "支出", "借方金额", "借方发生额", "付款金额", "消费金额", "Debit"],
      incomeAmount: ["收入金额", "收入", "贷方金额", "贷方发生额", "收款金额", "入账金额", "Credit"],
      category: ["分类", "交易分类", "账单分类", "收支分类", "类别", "Category"],
      project: ["活动", "项目", "归属活动", "标签", "Project"],
      note: ["备注", "备注信息", "说明", "摘要", "商品说明", "交易说明", "交易对方", "商户名称", "对方户名", "对方账户", "Note", "Description"],
      rawText: ["原文", "详情", "交易单号", "商户单号", "流水号", "Raw"]
    };
    function normalizeHeaderName(value) {
      return String(value || "").replace(/^\uFEFF/, "").trim().toLowerCase().replace(/[\\/\s"'“”‘’：:（）()_\-]/g, "");
    }
    function buildTableIndex(header) {
      const normalized = header.map(normalizeHeaderName);
      const find = aliases => {
        const wanted = aliases.map(normalizeHeaderName);
        const position = normalized.findIndex(name => wanted.includes(name));
        return position === -1 ? undefined : position;
      };
      return {
        date: find(tableAliases.date),
        type: find(tableAliases.type),
        amount: find(tableAliases.amount),
        expenseAmount: find(tableAliases.expenseAmount),
        incomeAmount: find(tableAliases.incomeAmount),
        category: find(tableAliases.category),
        project: find(tableAliases.project),
        noteIndexes: tableAliases.note.map(alias => find([alias])).filter(i => i !== undefined),
        rawText: find(tableAliases.rawText)
      };
    }
    function cellAt(cells, index) {
      return index === undefined ? "" : String(cells[index] || "").trim();
    }
    function parseMoneyCell(value) {
      const text = String(value || "").replace(/,/g, "").replace(/[¥￥元\s]/g, "").replace(/[()（）]/g, "-");
      const match = text.match(/[+-]?\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : NaN;
    }
    function normalizeDateCell(value) {
      const text = String(value || "").trim();
      const match = text.match(/(20\d{2})[年\/.-]?(\d{1,2})[月\/.-]?(\d{1,2})/);
      if (!match) return "";
      return `${match[1]}-${match[2].padStart(2, "0")}-${match[3].padStart(2, "0")}`;
    }
    function inferImportedType(typeText, amount, expenseAmount, incomeAmount) {
      const text = String(typeText || "").toLowerCase();
      if (/收入|收款|入账|贷|credit|income|in/.test(text)) return "income";
      if (/支出|付款|消费|借|debit|expense|out/.test(text)) return "expense";
      if (Number.isFinite(incomeAmount) && incomeAmount > 0 && (!Number.isFinite(expenseAmount) || expenseAmount === 0)) return "income";
      if (Number.isFinite(expenseAmount) && expenseAmount > 0) return "expense";
      return amount < 0 ? "expense" : "expense";
    }
    function normalizeImportedCategory(value, text) {
      const raw = String(value || "").trim();
      const matched = cats.find(cat => raw.includes(cat[0]));
      if (matched) return matched[0];
      const detected = detectCategory(`${raw} ${text}`);
      return detected === "其他" && raw ? raw : detected;
    }
    function parseTableImport(text) {
      const cleaned = text.replace(/^\uFEFF/, "").trim();
      if (!cleaned) throw new Error("表格内容为空");
      const lines = cleaned.split(/\r?\n/).filter(line => line.trim());
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const header = parseCsvLine(lines[0], delimiter).map(cell => cell.trim());
      const index = buildTableIndex(header);
      if (index.date === undefined) throw new Error("缺少列：日期");
      if (index.amount === undefined && index.expenseAmount === undefined && index.incomeAmount === undefined) throw new Error("缺少列：金额");
      return lines.slice(1).map((line, i) => {
        const cells = parseCsvLine(line, delimiter);
        const date = normalizeDateCell(cellAt(cells, index.date));
        const genericAmount = parseMoneyCell(cellAt(cells, index.amount));
        const expenseAmount = parseMoneyCell(cellAt(cells, index.expenseAmount));
        const incomeAmount = parseMoneyCell(cellAt(cells, index.incomeAmount));
        const amountSource = Number.isFinite(genericAmount) ? genericAmount : (Number.isFinite(expenseAmount) && expenseAmount > 0 ? expenseAmount : incomeAmount);
        if (!date || !Number.isFinite(amountSource)) throw new Error(`第 ${i + 2} 行缺少日期或金额`);
        const typeText = cellAt(cells, index.type);
        const noteParts = index.noteIndexes.map(noteIndex => cellAt(cells, noteIndex)).filter(Boolean);
        const note = Array.from(new Set(noteParts)).join(" / ") || "表格导入";
        const rawText = cellAt(cells, index.rawText) || line;
        const importedProject = projectName(cellAt(cells, index.project));
        const category = normalizeImportedCategory(cellAt(cells, index.category), `${note} ${rawText}`);
        const rowKey = [date, typeText, amountSource, category, importedProject, note, rawText].join("|");
        return {
          id: `csv_${hashText(rowKey)}_${i + 1}`,
          date,
          type: inferImportedType(typeText, amountSource, expenseAmount, incomeAmount),
          amount: Math.abs(amountSource),
          category,
          projectName: importedProject,
          note,
          rawText,
          createdAt: new Date().toISOString()
        };
      });
    }
    function validateImportData(parsed) {
      if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) throw new Error("导入内容必须是 JSON 对象");
      if (parsed.transactions !== undefined && !Array.isArray(parsed.transactions)) throw new Error("transactions 必须是数组");
      if (parsed.aaGroups !== undefined && !Array.isArray(parsed.aaGroups)) throw new Error("aaGroups 必须是数组");
      if (parsed.budgets !== undefined) {
        if (!parsed.budgets || typeof parsed.budgets !== "object" || Array.isArray(parsed.budgets)) throw new Error("budgets 必须是对象");
        Object.entries(parsed.budgets).forEach(([month, amount]) => {
          if (!/^\d{4}-\d{2}$/.test(month) || !Number.isFinite(Number(amount)) || Number(amount) < 0) throw new Error("预算字段不正确");
        });
      }
      if (parsed.yearBudgets !== undefined) {
        if (!parsed.yearBudgets || typeof parsed.yearBudgets !== "object" || Array.isArray(parsed.yearBudgets)) throw new Error("yearBudgets 必须是对象");
        Object.entries(parsed.yearBudgets).forEach(([year, amount]) => {
          if (!/^\d{4}$/.test(year) || !Number.isFinite(Number(amount)) || Number(amount) < 0) throw new Error("年度预算字段不正确");
        });
      }
      (parsed.transactions || []).forEach((t, index) => {
        if (!t || typeof t !== "object" || Array.isArray(t)) throw new Error(`第 ${index + 1} 条记账记录不是对象`);
        if (!t.id || typeof t.id !== "string") throw new Error(`第 ${index + 1} 条记账记录缺少 id`);
        if (!/^\d{4}-\d{2}-\d{2}$/.test(t.date || "")) throw new Error(`第 ${index + 1} 条记账记录日期格式不正确`);
        if (!["income", "expense"].includes(t.type)) throw new Error(`第 ${index + 1} 条记账记录类型不正确`);
        if (!Number.isFinite(Number(t.amount)) || Number(t.amount) < 0) throw new Error(`第 ${index + 1} 条记账记录金额不正确`);
        if (!t.category || typeof t.category !== "string") throw new Error(`第 ${index + 1} 条记账记录缺少分类`);
        if (t.projectName !== undefined && typeof t.projectName !== "string") throw new Error(`第 ${index + 1} 条记账记录活动不正确`);
        if (!t.note || typeof t.note !== "string") throw new Error(`第 ${index + 1} 条记账记录缺少备注`);
      });
      (parsed.aaGroups || []).forEach((g, groupIndex) => {
        if (!g || typeof g !== "object" || Array.isArray(g)) throw new Error(`第 ${groupIndex + 1} 个 AA 活动不是对象`);
        if (!g.id || typeof g.id !== "string") throw new Error(`第 ${groupIndex + 1} 个 AA 活动缺少 id`);
        if (!g.name || typeof g.name !== "string") throw new Error(`第 ${groupIndex + 1} 个 AA 活动缺少名称`);
        if (g.projectName !== undefined && typeof g.projectName !== "string") throw new Error(`第 ${groupIndex + 1} 个 AA 活动归属活动不正确`);
        if (!Array.isArray(g.members) || g.members.length < 2 || g.members.some(m => typeof m !== "string" || !m.trim())) throw new Error(`第 ${groupIndex + 1} 个 AA 活动成员不正确`);
        if (g.selfMember !== undefined && !g.members.includes(g.selfMember)) throw new Error(`第 ${groupIndex + 1} 个 AA 活动的“我是谁”不在成员中`);
        if (!Array.isArray(g.expenses)) throw new Error(`第 ${groupIndex + 1} 个 AA 活动费用必须是数组`);
        g.expenses.forEach((e, expenseIndex) => {
          if (!e || typeof e !== "object" || Array.isArray(e)) throw new Error(`第 ${groupIndex + 1} 个 AA 活动第 ${expenseIndex + 1} 条费用不是对象`);
          if (!e.id || typeof e.id !== "string") throw new Error(`第 ${groupIndex + 1} 个 AA 活动第 ${expenseIndex + 1} 条费用缺少 id`);
          if (!g.members.includes(e.payer)) throw new Error(`第 ${groupIndex + 1} 个 AA 活动第 ${expenseIndex + 1} 条费用付款人不在成员中`);
          if (e.date !== undefined && !/^\d{4}-\d{2}-\d{2}$/.test(e.date)) throw new Error(`第 ${groupIndex + 1} 个 AA 活动第 ${expenseIndex + 1} 条费用日期格式不正确`);
          if (!Number.isFinite(Number(e.amount)) || Number(e.amount) < 0) throw new Error(`第 ${groupIndex + 1} 个 AA 活动第 ${expenseIndex + 1} 条费用金额不正确`);
          if (!e.note || typeof e.note !== "string") throw new Error(`第 ${groupIndex + 1} 个 AA 活动第 ${expenseIndex + 1} 条费用缺少备注`);
          if (e.participants !== undefined && (!Array.isArray(e.participants) || e.participants.some(p => !g.members.includes(p)))) throw new Error(`第 ${groupIndex + 1} 个 AA 活动第 ${expenseIndex + 1} 条费用参与人不正确`);
        });
      });
    }
    function mergeImport() {
      const msg = document.querySelector("#msg");
      try {
        const parsed = JSON.parse(document.querySelector("#importText").value);
        validateImportData(parsed);
        const tx = new Map(state.transactions.map(t => [t.id, t]));
        const groups = new Map(state.aaGroups.map(g => [g.id, g]));
        (parsed.transactions || []).forEach(t => t?.id && tx.set(t.id, t));
        (parsed.aaGroups || []).forEach(g => g?.id && groups.set(g.id, g));
        state.transactions = [...tx.values()];
        state.aaGroups = [...groups.values()];
        state.budgets = { ...(state.budgets || {}), ...(parsed.budgets || {}) };
        state.yearBudgets = { ...(state.yearBudgets || {}), ...(parsed.yearBudgets || {}) };
        save();
        msg.textContent = "导入完成：已按 id 合并去重。";
      } catch {
        msg.textContent = "导入失败：JSON 格式或字段结构不正确。";
      }
    }
    function importCsv() {
      const msg = document.querySelector("#msg");
      try {
        const transactions = parseTableImport(document.querySelector("#importText").value);
        validateImportData({ transactions, aaGroups: [] });
        const tx = new Map(state.transactions.map(t => [t.id, t]));
        transactions.forEach(t => tx.set(t.id, t));
        state.transactions = [...tx.values()];
        save();
        msg.textContent = `表格导入完成：${transactions.length} 条记账记录。`;
      } catch {
        msg.textContent = "表格导入失败：请检查表头是否能识别出日期和金额列。";
      }
    }
    function loadCsvFile(event) {
      const file = event.target.files?.[0];
      const msg = document.querySelector("#msg");
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        document.querySelector("#importText").value = String(reader.result || "");
        msg.textContent = `已读取文件：${file.name}`;
      };
      reader.onerror = () => {
        msg.textContent = "文件读取失败，请改用复制粘贴表格内容。";
      };
      reader.readAsText(file, "utf-8");
    }
    document.querySelectorAll("[data-tab]").forEach(btn => btn.addEventListener("click", () => { tab = btn.dataset.tab; render(); }));
    render();
  </script>
</body>
